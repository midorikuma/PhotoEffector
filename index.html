<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="画像をドラッグ&ドロップしてリアルタイムにエフェクトを適用できるオンライン画像エディタ">
    <title>Photo Effector — 画像エフェクトエディタ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- ===== ドロップゾーン画面 ===== -->
    <section id="dropzone-screen" class="screen active">
        <div class="brand">
            <h1 class="brand-title">Photo <span class="accent">Effector</span></h1>
            <p class="brand-subtitle">画像をドロップしてエフェクトを適用</p>
        </div>

        <div id="dropzone" class="dropzone">
            <div class="dropzone-content">
                <div class="dropzone-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                </div>
                <p class="dropzone-text">画像をここにドラッグ&ドロップ</p>
                <p class="dropzone-hint">または</p>
                <label for="file-input" class="file-label" id="file-label">ファイルを選択</label>
                <input type="file" id="file-input" accept="image/*" hidden>
                <p class="dropzone-formats">対応形式: JPEG, PNG, WebP, GIF, BMP</p>
            </div>
            <div class="dropzone-ripple"></div>
        </div>
    </section>

    <!-- ===== エディタ画面 ===== -->
    <section id="editor-screen" class="screen">
        <header class="editor-header">
            <div class="header-left">
                <button id="btn-back" class="btn-icon" title="戻る">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <h2 class="editor-title">Photo <span class="accent">Effector</span></h2>
            </div>
            <div class="header-right">
                <button id="btn-reset" class="btn-secondary" title="リセット">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10" />
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
                    </svg>
                    リセット
                </button>
                <button id="btn-download" class="btn-primary" title="ダウンロード">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    ダウンロード
                </button>
            </div>
        </header>

        <div class="editor-body">
            <!-- キャンバスエリア -->
            <div class="canvas-area" id="canvas-area">
                <canvas id="preview-canvas"></canvas>
            </div>

            <!-- パラメータパネル -->
            <aside class="params-panel" id="params-panel">
                <!-- レイヤーパネル -->
                <div class="layer-panel">
                    <div class="panel-header"
                        style="display: flex; justify-content: space-between; align-items: center; padding: 10px 16px;">
                        <h3>レイヤー</h3>
                        <div class="header-right" style="gap: 5px;">
                            <label for="add-layer-input" class="btn-icon" title="レイヤーを追加"
                                style="width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </label>
                            <input type="file" id="add-layer-input" accept="image/*" hidden>
                        </div>
                    </div>
                    <div class="layer-list" id="layer-list">
                        <!-- レイヤリアイテムは動的生成 -->
                    </div>

                    <!-- 選択中レイヤーのプロパティ -->
                    <div class="layer-properties" id="layer-properties"
                        style="display: none; padding: 10px 16px; border-bottom: 1px solid var(--border); background: #1a1a1a;">
                        <div
                            style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                            <label style="font-size: 0.75rem; color: var(--text-sub);">不透明度</label>
                            <span id="opacity-val" style="font-size: 0.75rem; color: var(--accent);">100%</span>
                        </div>
                        <input type="range" id="opacity-slider" min="0" max="100" value="100"
                            style="margin-bottom: 12px;">

                        <div style="display: flex; align-items: center; justify-content: space-between;">
                            <label style="font-size: 0.75rem; color: var(--text-sub);">合成モード</label>
                            <select id="blend-mode-select"
                                style="padding: 4px; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 0.75rem;">
                                <option value="source-over">通常</option>
                                <option value="multiply">乗算</option>
                                <option value="screen">スクリーン</option>
                                <option value="overlay">オーバーレイ</option>
                                <option value="darken">比較（暗）</option>
                                <option value="lighten">比較（明）</option>
                                <option value="color-dodge">覆い焼きカラー</option>
                                <option value="color-burn">焼き込みカラー</option>
                                <option value="hard-light">ハードライト</option>
                                <option value="soft-light">ソフトライト</option>
                                <option value="difference">差解</option>
                                <option value="exclusion">除外</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>エフェクト調整</h3>
                    <div class="header-right" style="gap: 5px;">
                        <button id="btn-copy-params" class="btn-icon" title="パラメータをコピー"
                            style="width: 28px; height: 28px;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                        <button id="btn-paste-params" class="btn-icon" title="パラメータをペースト"
                            style="width: 28px; height: 28px;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2">
                                </path>
                                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                                <polyline points="12 11 12 17"></polyline>
                                <polyline points="9 14 12 17 15 14"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="panel-body" id="panel-body">
                    <!-- スライダーは ui.js で動的生成 -->
                </div>
                <div class="panel-footer">
                    <div class="format-selector">
                        <label for="format-select">保存形式:</label>
                        <select id="format-select">
                            <option value="image/png">PNG</option>
                            <option value="image/jpeg">JPEG</option>
                            <option value="image/webp">WebP</option>
                        </select>
                    </div>
                </div>
            </aside>
        </div>
    </section>

    <script src="js/layers.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/dropzone.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
